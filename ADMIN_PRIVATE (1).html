<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN — SG Tier Test</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f1a;--sur:#13162a;--sur2:#1a1e35;--card:#171b30;--cardh:#1f2440;--bor:rgba(255,255,255,0.07);--bor2:rgba(255,255,255,0.13);--acc:#f5a623;--txt:#e8eaf0;--txt2:#7b82a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;min-height:100vh;}
.adminbar{background:rgba(245,166,35,0.1);border-bottom:1px solid rgba(245,166,35,0.25);padding:8px 28px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px;}
.navbar{display:flex;align-items:center;padding:8px 28px;background:#10142a;border:1px solid rgba(80,100,220,0.3);border-radius:16px;box-shadow:0 0 24px rgba(60,80,200,0.18);margin:16px 20px 0;}
.navbar-logo{height:56px;object-fit:contain;}
.wrap{max-width:1200px;margin:0 auto;padding:1.4rem 1.2rem 4rem;}
.tabbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.2rem;padding:8px 10px;background:var(--sur);border:1px solid var(--bor);border-radius:14px;}
.tab{padding:7px 18px;border-radius:9px;background:transparent;border:1px solid transparent;color:var(--txt2);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:all 0.15s;}
.tab:hover{color:var(--txt);}
.tab.active{background:var(--sur2);border-color:var(--bor2);color:var(--txt);}
.sec{display:none;}.sec.active{display:block;}
.addrow{display:flex;gap:8px;margin-bottom:1rem;}
.addrow input{flex:1;padding:8px 14px;background:var(--sur);border:1px solid var(--bor);border-radius:9px;color:var(--txt);font-family:'Nunito',sans-serif;font-size:13px;outline:none;}
.addrow input:focus{border-color:var(--acc);}
.addrow input::placeholder{color:var(--txt2);}
.addrow button{padding:8px 18px;background:var(--acc);border:none;border-radius:9px;color:#1a1200;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
.poollbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.pool{background:var(--sur);border:1px dashed var(--bor);border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:44px;align-content:flex-start;margin-bottom:1.2rem;}
.pool.dover{border-color:var(--acc);}
.pchip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;background:var(--sur2);border:1px solid var(--bor);color:var(--txt);cursor:grab;user-select:none;}
.pchip.dragging{opacity:0.2;}
.twrap{background:var(--sur);border:1px solid var(--bor);border-radius:14px;overflow:hidden;}
.tcols{display:grid;grid-template-columns:repeat(5,1fr);}
.tcol{min-width:0;border-right:1px solid var(--bor);}
.tcol:last-child{border-right:none;}
.thead{padding:12px 8px 10px;text-align:center;border-bottom:2px solid;}
.tnum{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;display:block;}
.tcol.c1 .thead{background:rgba(255,200,50,0.07);border-color:#c8962a;color:#f5c842;}
.tcol.c2 .thead{background:rgba(180,180,190,0.06);border-color:#888;color:#b0b0b8;}
.tcol.c3 .thead{background:rgba(160,100,50,0.07);border-color:#7a4e28;color:#b07840;}
.tcol.c4 .thead{background:rgba(100,100,110,0.05);border-color:#555;color:#7b82a0;}
.tcol.c5 .thead{background:rgba(70,70,80,0.04);border-color:#444;color:#555a72;}
.titems{padding:8px 6px;display:flex;flex-direction:column;gap:4px;min-height:60px;}
.titems.dover{background:rgba(245,166,35,0.05);}
.prow{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--card);border-radius:8px;border:1px solid var(--bor);cursor:grab;user-select:none;transition:all 0.12s;}
.prow:hover{background:var(--cardh);border-color:var(--bor2);}
.prow.dragging{opacity:0.2;}
.hlbadge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.hlbadge.H{background:rgba(245,166,35,0.2);color:var(--acc);border:1px solid rgba(245,166,35,0.35);}
.hlbadge.L{background:rgba(123,130,160,0.15);color:var(--txt2);border:1px solid rgba(123,130,160,0.2);}
.pname{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;}
.removebtn{background:transparent;border:none;color:#ef5350;font-size:14px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
.stsec{margin-bottom:1.4rem;}
.stsec h3{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.dngbtn{padding:8px 16px;background:transparent;border:1px solid #e53935;border-radius:8px;color:#e53935;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.savebadge{position:fixed;bottom:20px;right:20px;background:rgba(46,125,50,0.9);color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.saveerr{position:fixed;bottom:20px;right:20px;background:rgba(229,57,53,0.9);color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.movl{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem;}
.mclose{position:absolute;top:12px;right:12px;background:var(--sur2);border:none;color:var(--txt2);font-size:14px;cursor:pointer;padding:5px 10px;border-radius:7px;font-family:'Nunito',sans-serif;font-weight:800;}
.hlbox{background:var(--sur);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:1.6rem;text-align:center;max-width:300px;width:100%;}
.hlbox h3{font-size:13px;font-weight:800;margin-bottom:0.4rem;}
.hlbox p{font-size:12px;color:var(--txt2);margin-bottom:1rem;}
.hlbtns{display:flex;gap:10px;justify-content:center;}
.hlbtn{flex:1;padding:10px;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.hlbtn.H{background:var(--acc);color:#1a1200;}
.hlbtn.L{background:var(--sur2);color:var(--txt);border:1px solid var(--bor);}
.charbox{background:var(--sur);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:1.8rem;max-width:400px;width:100%;position:relative;text-align:center;}
.charbox h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--acc);margin-bottom:0.3rem;}
.charbox p{font-size:12px;color:var(--txt2);margin-bottom:1.2rem;}
.char-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:1.2rem;}
.char-option{width:90px;padding:10px;border-radius:12px;border:2px solid var(--bor);cursor:pointer;transition:all 0.15s;background:var(--sur2);}
.char-option:hover{border-color:var(--acc);}
.char-option.selected{border-color:var(--acc);background:rgba(245,166,35,0.1);}
.char-option img{width:60px;height:80px;object-fit:contain;}
.char-option-name{font-size:10px;font-weight:700;color:var(--txt2);margin-top:4px;}
.char-confirm{width:100%;padding:10px;background:var(--acc);border:none;border-radius:9px;color:#1a1200;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
</style>
</head>

function emptyMode(){var s={pool:[]};for(var i=0;i<TNS.length;i++){s['H'+TNS[i]]=[];s['L'+TNS[i]]=[];}return s;}
var ST={mn:['Block Dash','Laser Dash Legendary'],m1:emptyMode(),m2:emptyMode(),playerChars:{}};
var DB_ROW_ID=null, DRG=null, PDR=null;
var pendingAdd={mode:null,name:null,charIdx:0};

async function loadData(){
  try{
    var res=await fetch(SUPABASE_URL+'/rest/v1/tierlist?select=id,data&limit=1',{
      headers:{'apikey':SUPABASE_SERVICE_KEY,'Authorization':'Bearer '+SUPABASE_SERVICE_KEY}
    });
    var rows=await res.json();
    if(rows&&rows.length>0){DB_ROW_ID=rows[0].id;ST=rows[0].data;if(!ST.playerChars)ST.playerChars={};}
  }catch(e){console.error(e);}
  document.getElementById('t-m1').textContent=ST.mn[0];
  document.getElementById('t-m2').textContent=ST.mn[1];
  renderMode('m1');renderMode('m2');
}

async function save(){
  try{
    var url, method, body;
    if(DB_ROW_ID){
      url=SUPABASE_URL+'/rest/v1/tierlist?id=eq.'+DB_ROW_ID;
      method='PATCH';
      body=JSON.stringify({data:ST,updated_at:new Date().toISOString()});
    } else {
      url=SUPABASE_URL+'/rest/v1/tierlist';
      method='POST';
      body=JSON.stringify({data:ST});
    }
    var res=await fetch(url,{
      method:method,
      headers:{'apikey':SUPABASE_SERVICE_KEY,'Authorization':'Bearer '+SUPABASE_SERVICE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:body
    });
    var txt=await res.text();
    if(res.ok){
      try{var rows=JSON.parse(txt);if(rows&&rows[0])DB_ROW_ID=rows[0].id;}catch(e){}
      var b=document.getElementById('savebadge');b.style.opacity='1';setTimeout(function(){b.style.opacity='0';},1500);
    } else {
      console.error('Save error:',res.status,txt);
      var b=document.getElementById('saveerr');b.style.opacity='1';setTimeout(function(){b.style.opacity='0';},2000);
    }
  }catch(e){
    console.error('Save exception:',e);
    var b=document.getElementById('saveerr');b.style.opacity='1';setTimeout(function(){b.style.opacity='0';},2000);
  }
}

function showTab(id,btn){
  var ids=['mode1','mode2','settings'];
  for(var i=0;i<ids.length;i++){var el=document.getElementById(ids[i]);if(el)el.className='sec'+(ids[i]===id?' active':'');}
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  if(btn) btn.classList.add('active');
}

function startAdd(mode){
  var inp=document.getElementById('i-'+mode);
  var name=inp.value.trim();if(!name)return;
  var all=ST[mode].pool.slice();
  for(var i=0;i<TNS.length;i++) all=all.concat(ST[mode]['H'+TNS[i]],ST[mode]['L'+TNS[i]]);
  if(all.indexOf(name)>=0){inp.value='';return;}
  pendingAdd={mode:mode,name:name,charIdx:0};inp.value='';
  document.getElementById('char-player-label').textContent='Pick character for '+name;
  buildCharGrid();
  document.getElementById('charmod').style.display='flex';
}

function buildCharGrid(){
  var grid=document.getElementById('char-grid');grid.innerHTML='';
  for(var i=0;i<CHARS.length;i++){
    var opt=document.createElement('div');opt.className='char-option'+(i===pendingAdd.charIdx?' selected':'');
    opt.innerHTML='<img src="'+CHARS[i].img+'" alt="'+CHARS[i].name+'"><div class="char-option-name">'+CHARS[i].name+'</div>';
    (function(idx){opt.onclick=function(){pendingAdd.charIdx=idx;var opts=document.querySelectorAll('.char-option');for(var j=0;j<opts.length;j++)opts[j].classList.remove('selected');this.classList.add('selected');};})(i);
    grid.appendChild(opt);
  }
}

function confirmAdd(){
  document.getElementById('charmod').style.display='none';
  ST[pendingAdd.mode].pool.push(pendingAdd.name);
  ST.playerChars[pendingAdd.name]=pendingAdd.charIdx;
  save();renderMode(pendingAdd.mode);
}

document.getElementById('i-m1').addEventListener('keydown',function(e){if(e.key==='Enter')startAdd('m1');});
document.getElementById('i-m2').addEventListener('keydown',function(e){if(e.key==='Enter')startAdd('m2');});

function renderMode(key){
  var pool=document.getElementById('pool-'+key);pool.innerHTML='';
  for(var i=0;i<ST[key].pool.length;i++) pool.appendChild(mkChip(ST[key].pool[i],key));
  var cont=document.getElementById('cols-'+key);cont.innerHTML='';
  for(var n=0;n<TNS.length;n++){
    var tn=TNS[n];
    var col=document.createElement('div');col.className='tcol c'+tn;
    var hdr=document.createElement('div');hdr.className='thead';hdr.innerHTML='<span class="tnum">TIER '+tn+'</span>';
    var items=document.createElement('div');items.className='titems';
    items.ondragover=dov;
    (function(k,t){items.ondrop=function(e){drp(e,k,t);};})(key,tn);
    var hp=ST[key]['H'+tn],lp=ST[key]['L'+tn];
    for(var j=0;j<hp.length;j++) items.appendChild(mkRow(hp[j],key,tn,'H'));
    for(var j=0;j<lp.length;j++) items.appendChild(mkRow(lp[j],key,tn,'L'));
    col.appendChild(hdr);col.appendChild(items);cont.appendChild(col);
  }
}

function mkChip(name,mode){
  var c=document.createElement('div');c.className='pchip';c.draggable=true;c.textContent=name;
  c.ondragstart=function(){DRG={name:name,mode:mode,ft:0,fhl:null};setTimeout(function(){c.classList.add('dragging');},0);};
  c.ondragend=function(){c.classList.remove('dragging');};
  c.ondblclick=function(){if(!confirm('Remove '+name+'?'))return;ST[mode].pool=ST[mode].pool.filter(function(p){return p!==name;});save();renderMode(mode);};
  return c;
}

function mkRow(name,mode,tier,hl){
  var c=document.createElement('div');c.className='prow';c.draggable=true;
  c.innerHTML='<span class="hlbadge '+hl+'">'+hl+'</span><span class="pname">'+name+'</span><button class="removebtn">x</button>';
  c.ondragstart=function(e){DRG={name:name,mode:mode,ft:tier,fhl:hl};setTimeout(function(){c.classList.add('dragging');},0);e.stopPropagation();};
  c.ondragend=function(){c.classList.remove('dragging');};
  c.querySelector('.removebtn').onclick=function(e){e.stopPropagation();ST[mode][hl+tier]=ST[mode][hl+tier].filter(function(p){return p!==name;});save();renderMode(mode);};
  return c;
}

function dov(e){e.preventDefault();e.currentTarget.classList.add('dover');e.currentTarget.addEventListener('dragleave',function(){e.currentTarget.classList.remove('dover');},{once:true});}

function drp(e,mode,tier){
  e.preventDefault();e.currentTarget.classList.remove('dover');
  if(!DRG||DRG.mode!==mode)return;
  var name=DRG.name,ft=DRG.ft,fhl=DRG.fhl;
  if(tier===0){rmFrom(mode,name,ft,fhl);if(ST[mode].pool.indexOf(name)<0)ST[mode].pool.push(name);DRG=null;save();renderMode(mode);return;}
  PDR={mode:mode,tier:tier,name:name,ft:ft,fhl:fhl};
  document.getElementById('hlname').textContent=name+' - Tier '+tier;
  document.getElementById('hlmod').style.display='flex';
  DRG=null;
}

function confirmDrop(hl){
  document.getElementById('hlmod').style.display='none';
  if(!PDR)return;
  var mode=PDR.mode,tier=PDR.tier,name=PDR.name,ft=PDR.ft,fhl=PDR.fhl;PDR=null;
  rmFrom(mode,name,ft,fhl);
  if(ST[mode][hl+tier].indexOf(name)<0)ST[mode][hl+tier].push(name);
  save();renderMode(mode);
}

function rmFrom(mode,name,ft,fhl){
  ST[mode].pool=ST[mode].pool.filter(function(p){return p!==name;});
  if(ft&&fhl)ST[mode][fhl+ft]=ST[mode][fhl+ft].filter(function(p){return p!==name;});
}

function clearAll(){if(!confirm('Remove all players?'))return;ST.m1=emptyMode();ST.m2=emptyMode();save();renderMode('m1');renderMode('m2');}

loadData();
</script>
</body>
</html>
